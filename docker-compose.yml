version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  bot:
    build: .
    command: python -m bot.main
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  agent-api:
    build: .
    command: uvicorn api.agent_endpoint:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
